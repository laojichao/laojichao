name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/snake.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Copy snake to profile
        run: |
          mkdir -p profile
          cp dist/github-contribution-grid-snake.svg profile/snake.svg
          cp dist/github-contribution-grid-snake-dark.svg profile/snake-dark.svg

      - name: Commit snake
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/snake.svg profile/snake-dark.svg
          git commit -m "chore: update contribution snake" || exit 0
          git push